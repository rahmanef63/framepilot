<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Design Platform" description="Interactive Canva-style platform wireframe — rail nav, hero search, 6 screens, overlays. Reskins live via preset + theme." -->
<helmet>
<script src="./ds-base.js"></script>
<style>html,body{height:100%;margin:0;background:var(--background)}</style>
</helmet>
<x-import
  component-from-global-scope="DesignSystem_5714f5.DesignPlatform"
  theme="{{ theme }}"
  preset="{{ preset }}"
  hint-size="100%,760px"
  style="display:block;height:100vh;width:100%">
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 800 },
  &quot;preset&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;rupa&quot;, &quot;modern-minimal&quot;, &quot;emerald&quot;],
    &quot;default&quot;: &quot;rupa&quot;,
    &quot;tsType&quot;: &quot;\&quot;rupa\&quot; | \&quot;modern-minimal\&quot; | \&quot;emerald\&quot;&quot;,
    &quot;section&quot;: &quot;Theme&quot;
  },
  &quot;theme&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;light&quot;, &quot;dark&quot;],
    &quot;default&quot;: &quot;light&quot;,
    &quot;tsType&quot;: &quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,
    &quot;section&quot;: &quot;Theme&quot;
  }
}">
class Component extends DCLogic {
  renderVals() {
    return {
      // Reskin the whole platform by swapping preset; toggle light/dark.
      theme: this.props.theme ?? "light",
      preset: this.props.preset ?? "rupa",
    };
  }
}
</script>
</body>
</html>
